{% load static %}

<!DOCTYPE html>
<html>
<head>
<title>Contacts</title>
<link rel="stylesheet" href="{% static 'css/features.css' %}">
</head>

<body>

<div class="container">

<h1 class="page-title">
📞 Trusted Contacts
</h1>

<!-- Add Contact Form -->
<div class="card">
<form method="POST" action="/dashboard/contacts/">

    {% csrf_token %}

    <input
        type="text"
        name="name"
        placeholder="Contact Name"
        required>

    <input
        type="tel"
        name="phone"
        placeholder="Phone Number"
        pattern="[6789][0-9]{9}"
        maxlength="10"
        inputmode="numeric"
        oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)"
        title="Phone number must start with 6, 7, 8, or 9 and contain exactly 10 digits."
        required>

    <input
        type="text"
        name="relationship"
        placeholder="Relationship"
        required>

    <button type="submit" class="btn">
        Add Contact
    </button>

</form>

</div>

<div class="card">

<h2>Saved Contacts</h2>

<table>

<tr>
    <th>Name</th>
    <th>Phone</th>
    <th>Relationship</th>
    <th>Action</th>
</tr>

{% for contact in contacts %}

<tr>
    <td>{{ contact.contact_name }}</td>
    <td>{{ contact.phone_number }}</td>
    <td>{{ contact.relationship }}</td>
    <td>
        <form method="POST" action="/dashboard/add_trusted_contact/">
            {% csrf_token %}
            <input type="hidden" name="contact_id" value="{{ contact.id }}">
            <button type="submit" class="btn">
                Add to Trusted Contacts
            </button>
        </form>
    </td>
</tr>

{% endfor %}

</table>

</div>

</div>

<div class="nav-links" style="text-align:center; margin:20px 0;">
    <a href="/dashboard/" class="btn">
        ← Back to Dashboard
    </a>
</div>

</body>
</html>

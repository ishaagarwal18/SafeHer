{% load static %}

<!DOCTYPE html>
<html>
<head>
<title>Journey</title>
<link rel="stylesheet" href="{% static 'css/features.css' %}">
</head>

<body>

<div class="container">

<h1 class="page-title">
🚖 Start Journey
</h1>

<div class="card">
<form method="POST">

{% csrf_token %}

<input type="text"
name="source"
placeholder="Source">

<input type="text"
name="destination"
placeholder="Destination">

<select name="transport">

<option>Car</option>
<option>Bus</option>
<option>Train</option>

</select>

<button class="btn">
Start Journey
</button>

</form>

<table>

<tr>
<th>Source</th>
<th>Destination</th>
<th>Transport</th>
<th>Status</th>
</tr>

{% for j in journeys %}

<tr>
<td>{{ j.source }}</td>
<td>{{ j.destination }}</td>
<td>{{ j.transport_mode }}</td>
<td>{{ j.status }}</td>
</tr>

{% endfor %}

</table>

</div>

</div>

</body>
</html>

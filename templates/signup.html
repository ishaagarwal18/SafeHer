{% load static %}

<!DOCTYPE html>
<html>
<head>

    <title>Signup</title>

    <link rel="stylesheet"
    href="{% static 'css/auth.css' %}">

</head>

<body>

<div class="auth-card">

    <h1>Create Account</h1>

    <form method="POST">

        {% csrf_token %}

        <div class="input-group">
            <input
            type="text"
            name="name"
            placeholder="Full Name"
            required>
        </div>

        <div class="input-group">
            <input
            type="email"
            name="email"
            placeholder="Email"
            required>
        </div>

        <div class="input-group">
            <input
            type="password"
            name="password"
            placeholder="Password"
            required>
        </div>

        <div class="input-group">
            <input
            type="text"
            name="emergency_contact"
            placeholder="Emergency Contact"
            required>
        </div>

        {% if error %}
            <p style="color:red;
            margin-bottom:15px;
            text-align:center;">
                {{ error }}
            </p>
        {% endif %}

        <button type="submit">
            Create Account
        </button>

    </form>

    <div class="extra">
        Already have an account?

        <a href="/login/">
            Login
        </a>
    </div>

</div>

</body>
</html>

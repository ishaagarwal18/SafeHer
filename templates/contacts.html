{% load static %}

<!DOCTYPE html>
<html>
<head>
<title>Contacts</title>
<link rel="stylesheet" href="{% static 'css/features.css' %}">
</head>

<body>

<div class="container">

<h1 class="page-title">
📞 Trusted Contacts
</h1>

<div class="card">
<form method="POST">

{% csrf_token %}

<input type="text"
name="name"
placeholder="Contact Name">

<input type="text"
name="phone"
placeholder="Phone Number">

<input type="text"
name="relationship"
placeholder="Relationship">

<button class="btn">
Add Contact
</button>

</form>

</div>

<div class="card">

<h2>Saved Contacts</h2>
<table>

<tr>
<th>Name</th>
<th>Phone</th>
<th>Relationship</th>
</tr>

{% for contact in contacts %}

<tr>
<td>{{ contact.contact_name }}</td>
<td>{{ contact.phone_number }}</td>
<td>{{ contact.relationship }}</td>
</tr>

{% endfor %}

</table>

</div>

</div>
<div class="nav-links" style="text-align: center; margin: 20px 0;">
    <a href="/dashboard/" class="btn">
        ← Back to Dashboard
    </a>
</div>

</body>
</html>

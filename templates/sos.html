{% load static %}

<!DOCTYPE html>
<html>
<head>
<title>SOS</title>
<link rel="stylesheet" href="{% static 'css/features.css' %}">
</head>

<body>

<div class="container">

<h1 class="page-title">
🚨 Emergency SOS
</h1>

<div class="card">

<h2>Need Immediate Help?</h2>

<p>
Press the button below to notify trusted contacts.
</p>

<br>

<button class="btn">
SEND SOS ALERT
</button>

</div>

<div class="card">

<h2>Emergency Numbers</h2>

<table>

<tr>
<th>Service</th>
<th>Number</th>
</tr>

<tr>
<td>Police</td>
<td>100</td>
</tr>

<tr>
<td>Women Helpline</td>
<td>1091</td>
</tr>

<tr>
<td>Ambulance</td>
<td>108</td>
</tr>

</table>

</div>

</div>

</body>
</html>

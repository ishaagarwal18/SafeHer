{% load static %}

<!DOCTYPE html>
<html>
<head>
<title>SOS</title>
<link rel="stylesheet" href="{% static 'css/features.css' %}">
</head>

<body>

<div class="container">

<h1 class="page-title">
🚨 Emergency SOS
</h1>

<div class="card">

<h2>Need Immediate Help?</h2>

<p>
Press the button below to notify trusted contacts.
</p>

<br>
<form method="POST">

{% csrf_token %}

<button class="btn">
SEND SOS ALERT
</button>

</form>
</div>

<div class="card">

<h2>Emergency Numbers</h2>
<table>

<tr>
<th>Time</th>
<th>Status</th>
<th>Location</th>
</tr>

{% for alert in alerts %}

<tr>
<td>{{ alert.alert_time }}</td>
<td>{{ alert.status }}</td>
<td>{{ alert.location }}</td>
</tr>

{% endfor %}

</table>
</div>

</div>

</body>
</html>

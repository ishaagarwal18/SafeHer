{% load static %}

<!DOCTYPE html>
<html>
<head>

    <title>Login</title>

    <link rel="stylesheet"
    href="{% static 'css/auth.css' %}">

</head>

<body>

<div class="auth-card">

    <h1>Welcome Back</h1>

    <form method="POST">

        {% csrf_token %}

        <div class="input-group">

            <input
            type="email"
            name="email"
            placeholder="Email"
            required>

        </div>

        <div class="input-group">

            <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        </div>

        {% if error %}
            <p style="color:red;
            margin-bottom:15px;
            text-align:center;">
                {{ error }}
            </p>
        {% endif %}

        <button type="submit">
            Login
        </button>

    </form>

    <div class="extra">

        Don't have an account?

        <a href="/signup/">
            Sign Up
        </a>

    </div>

</div>
</body>
</html>
